kind = "web"
previewPath = "/"
title = "ShakaSite"
version = "1.0.0"
id = "artifacts/shakasite"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20488

[services.development]
run = "pnpm --filter @workspace/shakasite run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shakasite", "run", "build" ]
publicDir = "artifacts/shakasite/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20488"
BASE_PATH = "/"
